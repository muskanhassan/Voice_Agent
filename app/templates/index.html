<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        AI Voice Assistant
    </title>

    <link rel="stylesheet" href="/static/style.css?v=2">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>
                🤖 AI Voice Assistant
            </h1>

            <p class="subtitle">
                Talk with your smart assistant
            </p>

            <!-- Voice Dropdown -->
            <div class="controls">

                <div class="dropdown-box">

                    <label>
                        Voice
                    </label>

                    <select id="voice">

                        <option value="Female">
                            Female
                        </option>

                        <option value="Male">
                            Male
                        </option>

                    </select>

                </div>

            </div>

            <!-- Buttons -->
            <div class="button-group">

                <button id="mic-btn">
                    🎤 Start Talking
                </button>

                <button id="stop-btn">
                    ⛔ Stop
                </button>

            </div>

            <!-- Chat Area -->
            <div class="chat-box" id="chat-box">

                <div class="message ai">

                    Hello! I am your
                    AI Assistant.

                </div>

            </div>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
